services:
  app:
    image: analytics-api:v1
    build:
      context: .
      dockerfile: Dockerfile

    env_file:
      - .env.config

    ports:
      - "8002:8002"

    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

    volumes:
      - ./src:/code:rw

    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile

        - action: rebuild
          path: ./requirements.txt

        - action: rebuild
          path: ./compose.yaml

  db_service:
    image: timescale/timescaledb:latest-pg17

    environment:
      POSTGRES_USER: timescale_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: timescale_db

    volumes:
      - timescaledb_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    expose:
      - "5432"

volumes:
  timescaledb_data: